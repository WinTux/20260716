- name: Asegurarse de tener Java instalado
  apt:
    name: openjdk-25-jdk
    state: present
    update_cache: yes

- name: Crear usuario del servicio
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Crear directorio para la aplicacion
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
